<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./root11.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Agdasima:wght@700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Big Shoulders Stencil Display:wght@800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Caesar Dressing:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="locofy_root2">
      <footer class="locofy_container">
        <img
          class="locofy_image-1-icon2"
          alt=""
          src="./public/image-2@2x.png"
        />

        <img
          class="locofy_image-2-icon2"
          alt=""
          src="./public/image-2@2x.png"
        />

        <div class="locofy_background"></div>
      </footer>
      <div class="locofy_root-child"></div>
      <div class="locofy_profile"></div>
      <div class="locofy_root-item"></div>
      <div class="locofy_root-inner"></div>
      <section class="locofy_content">
        <div class="locofy_session-controls">
          <div class="locofy_session-controls-child"></div>
          <div class="locofy_session-controls-inner">
            <div class="locofy_facebook-group">
              <img
                class="locofy_facebook-icon2"
                alt=""
                src="./public/Facebook2@2x.png"
              />

              <img
                class="locofy_google-plus-icon2"
                alt=""
                src="./public/Google-Plus2@2x.png"
              />

              <img
                class="locofy_instagram-icon2"
                alt=""
                src="./public/Instagram2@2x.png"
              />

              <img
                class="locofy_linkedin-icon2"
                alt=""
                src="./public/LinkedIn2@2x.png"
              />
            </div>
          </div>
          <button class="locofy_magnifyingglass2"></button>
          <div class="locofy_footer">
            <div class="locofy_container2">
              <h2 class="locofy_avong-nen-romy2">Avong Nen Romy</h2>
              <h2 class="locofy_avong-nen-romy3">Avong Nen Romy</h2>
            </div>
            <div class="locofy_search-area">
              <div class="locofy_personal-info">
                <div class="locofy_personal-info-child"></div>
                <div class="locofy_search-box">
                  <div class="locofy_search-parent">
                    <input
                      class="locofy_search2"
                      placeholder="search"
                      type="text"
                    />

                    <b class="locofy_search3">search</b>
                  </div>
                </div>
                <img
                  class="locofy_vector-icon"
                  alt=""
                  src="./public/Search-Icon.svg"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="locofy_about-area-wrapper">
          <div class="locofy_about-area">
            <div class="locofy_about-header">
              <div class="locofy_footer-content">
                <h2 class="locofy_about-us">about us<br /></h2>
                <h2 class="locofy_about-us2" id="aboutUsText1">
                  about us<br />
                </h2>
              </div>
            </div>
            <div class="locofy_rectangle-parent3">
              <div class="locofy_frame-child3"></div>
              <div class="locofy_session-controls-inner">
                <div class="locofy_info">
                  <img
                    class="locofy_facebooklogo-icon"
                    alt=""
                    src="./public/FacebookLogo.svg"
                  />

                  <img
                    class="locofy_instagramlogo-icon"
                    alt=""
                    src="./public/InstagramLogo.svg"
                  />

                  <img
                    class="locofy_goodreadslogo-icon"
                    alt=""
                    src="./public/GoodreadsLogo.svg"
                  />
                </div>
              </div>
              <div class="locofy_social-icons">
                <div class="locofy_profile-details">
                  <div class="locofy_name-email-contact">
                    name:<br /><br />email:<br /><br />contact number:<br /><br />emergency
                    contact:<br />
                  </div>
                  <h1 class="locofy_profile2">profile</h1>
                </div>
                <div class="locofy_wrapper">
                  <div class="locofy_contact-info">
                    <div class="locofy_user-management">
                      <img
                        class="locofy_user-icon"
                        loading="lazy"
                        alt=""
                        src="./public/User.svg"
                      />

                      <img
                        class="locofy_user-management-child"
                        alt=""
                        src="./public/Ellipse-1.svg"
                      />
                    </div>
                  </div>
                </div>
              </div>
              <div class="locofy_media-links">
                <div class="locofy_user-info-parent">
                  <div class="locofy_user-info">
                    <div class="locofy_logout-area" id="logoutArea"></div>
                    <div class="locofy_log-out">log out</div>
                  </div>
                  <div class="locofy_user-area">
                    <div class="locofy_solid-member">solid member</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <button class="locofy_house-wrapper">
        <img
          class="locofy_house-icon2"
          alt=""
          src="./public/House.svg"
          id="houseIcon"
        />
      </button>
    </div>

    <script>
      var aboutUsText1 = document.getElementById("aboutUsText1");
      if (aboutUsText1) {
        aboutUsText1.addEventListener("click", function () {
          window.open("https://www.facebook.com/AvongRomy");
        });
      }
      
      var logoutArea = document.getElementById("logoutArea");
      if (logoutArea) {
        logoutArea.addEventListener("click", function (e) {
          window.location.href = "/";
        });
      }
      
      var houseIcon = document.getElementById("houseIcon");
      if (houseIcon) {
        houseIcon.addEventListener("click", function (e) {
          window.location.href = "./homepage1.html";
        });
      }
      </script>
  </body>
</html>
