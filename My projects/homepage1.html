<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./homepage1.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Agdasima:wght@700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Big Shoulders Stencil Display:wght@800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Caesar Dressing:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="locofy_homepage">
      <section class="locofy_frame-parent10">
        <div class="locofy_frame-wrapper3">
          <div class="locofy_rectangle-parent24">
            <button
              class="locofy_rectangle-button"
              id="rectangleButton"
            ></button>
            <h3 class="locofy_prices">PRices</h3>
          </div>
        </div>
        <div class="locofy_division">
          <img
            class="locofy_image-2-icon5"
            loading="lazy"
            alt=""
            src="./public/image-21@2x.png"
            id="image2"
          />

          <div class="locofy_set">
            <img
              class="locofy_image-3-icon2"
              loading="lazy"
              alt=""
              src="./public/image-3@2x.png"
              id="image3"
            />
          </div>
          <div class="locofy_frame-parent11">
            <div class="locofy_image-1-container">
              <img
                class="locofy_image-1-icon4"
                alt=""
                src="./public/image-2@2x.png"
              />

              <div class="locofy_rectangle-parent25" id="groupContainer">
                <div class="locofy_frame-child30"></div>
                <h2 class="locofy_avong-nen-romy18" id="avongNenRomy">
                  Avong Nen Romy
                </h2>
                <div class="locofy_rectangle-parent26">
                  <div class="locofy_frame-child31"></div>
                  <input
                    class="locofy_search18"
                    placeholder="search"
                    type="text"
                  />

                  <img
                    class="locofy_vector-icon11"
                    alt=""
                    src="./public/Search-Icon.svg"
                  />
                </div>
                <button class="locofy_magnifyingglass17"></button>
                <div class="locofy_facebook-parent13">
                  <img
                    class="locofy_facebook-icon16"
                    alt=""
                    src="./public/Facebook2@2x.png"
                  />

                  <img
                    class="locofy_google-plus-icon16"
                    alt=""
                    src="./public/Google-Plus2@2x.png"
                  />

                  <img
                    class="locofy_linkedin-icon16"
                    alt=""
                    src="./public/LinkedIn2@2x.png"
                  />

                  <img
                    class="locofy_instagram-icon16"
                    alt=""
                    src="./public/Instagram2@2x.png"
                  />
                </div>
                <button class="locofy_profile3">
                  <img
                    class="locofy_profile-icon20"
                    alt=""
                    loading="lazy"
                    src="./public/Profile@2x.png"
                  />
                </button>
              </div>
            </div>
            <img
              class="locofy_image-4-icon2"
              loading="lazy"
              alt=""
              src="./public/image-4@2x.png"
              id="image4"
            />
          </div>
        </div>
      </section>
      <div class="locofy_level-one">
        <h1 class="locofy_one-target-many4">ONE TARGET. MANY WAYS TO HIT.</h1>
      </div>
    </div>

    <script>
      var rectangleButton = document.getElementById("rectangleButton");
      if (rectangleButton) {
        rectangleButton.addEventListener("click", function (e) {
          window.location.href = "./root3.html";
        });
      }
      
      var image2 = document.getElementById("image2");
      if (image2) {
        image2.addEventListener("click", function (e) {
          window.location.href = "./hero-c-t-a1.html";
        });
      }
      
      var image3 = document.getElementById("image3");
      if (image3) {
        image3.addEventListener("click", function (e) {
          window.location.href = "./root21.html";
        });
      }
      
      var avongNenRomy = document.getElementById("avongNenRomy");
      if (avongNenRomy) {
        avongNenRomy.addEventListener("click", function (e) {
          window.location.href = "/";
        });
      }
      
      var groupContainer = document.getElementById("groupContainer");
      if (groupContainer) {
        groupContainer.addEventListener("click", function (e) {
          window.location.href = "./page.html";
        });
      }
      
      var image4 = document.getElementById("image4");
      if (image4) {
        image4.addEventListener("click", function (e) {
          window.location.href = "./i-phone-pro1.html";
        });
      }
      </script>
  </body>
</html>
